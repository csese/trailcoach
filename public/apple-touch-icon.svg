<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff8c42"/>
    </linearGradient>
    <linearGradient id="trailGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#0f0f0f"/>
  <!-- Back mountain -->
  <path d="M18 135 L63 63 L108 135 Z" fill="#2a2a2a"/>
  <!-- Front mountain with gradient -->
  <path d="M54 135 L104 45 L155 135 Z" fill="url(#mountainGrad)"/>
  <!-- Snow cap -->
  <path d="M104 45 L90 72 L104 65 L119 72 Z" fill="#ffffff" opacity="0.9"/>
  <!-- Trail path winding up -->
  <path d="M81 135 Q94 117 86 104 Q79 94 90 81 Q101 68 97 58"
        stroke="url(#trailGrad)" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Runner dot -->
  <circle cx="90" cy="81" r="7" fill="#ffffff"/>
</svg>
