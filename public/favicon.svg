<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff8c42"/>
    </linearGradient>
    <linearGradient id="trailGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0f0f0f"/>
  <!-- Back mountain -->
  <path d="M10 75 L35 35 L60 75 Z" fill="#2a2a2a"/>
  <!-- Front mountain with gradient -->
  <path d="M30 75 L58 25 L86 75 Z" fill="url(#mountainGrad)"/>
  <!-- Snow cap -->
  <path d="M58 25 L50 40 L58 36 L66 40 Z" fill="#ffffff" opacity="0.9"/>
  <!-- Trail path winding up -->
  <path d="M45 75 Q52 65 48 58 Q44 52 50 45 Q56 38 54 32"
        stroke="url(#trailGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Runner dot -->
  <circle cx="50" cy="45" r="4" fill="#ffffff"/>
</svg>
